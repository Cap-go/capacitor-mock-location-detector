<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />


    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
<title>@capgo/capacitor-mock-location-detector</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>@capgo/capacitor-mock-location-detector</h1>
      <p class="lead">Run layered GPS spoofing checks on a native device.</p>

      <div class="actions">
        <button id="run-analyze">Analyze location integrity</button>
        <button id="toggle-monitor">Start monitoring</button>
        <button id="open-settings">Open settings</button>
        <button id="get-version">Get plugin version</button>
      </div>

      <pre id="plugin-output">Press a button to run an action.</pre>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
